name: UI Tests

on:
  push:
    branches: [ "main", "master", "**" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run UI Tests
        run: mvn clean test -Dtest=${{ inputs.test-class }} --no-transfer-progress
        env:
          HEADLESS: true

      - name: Generate Allure Report
        if: always()
        run: mvn allure:report

      - name: Publish Allure Report (Artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin
          retention-days: 14

      - name: Upload Test Results (XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports
          retention-days: 14